name: Scrape & Deploy to GitHub Pages

concurrency:
  group: github-pages
  cancel-in-progress: true

on:
  schedule:
    - cron: '*/15 * * * *'     # برای تست - بعداً به ۳ ساعت تغییر بده
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Create/Update requirements.txt
        working-directory: ./Files
        run: |
          echo -e "requests\nbeautifulsoup4\nselenium\npytz\njdatetime" > requirements.txt

      - name: Install dependencies
        working-directory: ./Files
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        working-directory: ./Files
        run: python main.py

      # === Debug Steps (جدید) ===
      - name: 📋 Show files and changes
        run: |
          echo "=== Files in root ==="
          ls -la
          echo "=== Files in ./Files ==="
          ls -la ./Files
          echo "=== Content of proxy.txt (first 10 lines) ==="
          head -n 10 proxy.txt 2>/dev/null || echo "proxy.txt not found in root"
          head -n 10 ./Files/proxy.txt 2>/dev/null || echo "proxy.txt not found in Files folder"

      - name: Commit and push changes
        id: commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # اضافه کردن دقیق‌تر فایل‌ها
          git add proxy.txt ./Files/proxy.txt README.md Files/requirements.txt index.html 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "⛓️‍💥 Argh94 Update - $(date '+%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Upload artifact
        if: steps.commit.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: |
            index.html
            proxy.txt
            ./Files/proxy.txt

      - name: 🚀 Deploy to GitHub Pages
        if: steps.commit.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/deploy-pages@v5
        id: deployment

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
