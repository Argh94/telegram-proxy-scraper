name: Scrape & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 */3 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Create/Update requirements.txt
        working-directory: ./Files
        run: |
          echo -e "requests\nbeautifulsoup4\nselenium\npytz\njdatetime" > requirements.txt

      - name: Install dependencies
        working-directory: ./Files
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        working-directory: ./Files
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add proxy.txt README.md Files/requirements.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "⛓️‍💥 Argh94 Update - $(date '+%Y-%m-%d %H:%M')"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: |
            index.html
            proxy.txt

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        id: deployment

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
