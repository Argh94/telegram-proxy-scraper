name: Telegram Proxy Scraper

on:
  schedule:
    - cron: '0 */3 * * *'   # هر ۳ ساعت
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Create or update requirements.txt
        working-directory: ./Files
        run: |
          echo -e "requests\nbeautifulsoup4\nselenium\npytz\njdatetime" > requirements.txt
          cat requirements.txt

      - name: Install dependencies
        working-directory: ./Files
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        working-directory: ./Files
        run: python main.py

      # === دیباگ مهم (برای فهمیدن مشکل) ===
      - name: Debug - Check proxy.txt location and content
        run: |
          echo "=== Files in root ==="
          ls -la
          echo "=== Files in ./Files ==="
          ls -la ./Files
          echo "=== First 15 lines of proxy.txt in root ==="
          head -n 15 proxy.txt 2>/dev/null || echo "proxy.txt not found in root"
          echo "=== First 15 lines of proxy.txt in ./Files ==="
          head -n 15 ./Files/proxy.txt 2>/dev/null || echo "proxy.txt not found in Files"

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # اضافه کردن هر دو مکان احتمالی proxy.txt
          git add proxy.txt ./Files/proxy.txt README.md Files/requirements.txt index.html 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "⛓️‍💥 Argh94 Update - $(date '+%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "Changes committed and pushed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
