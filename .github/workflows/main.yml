name: Scrape & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 */3 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
        id: setup-chrome

      - name: Create/Update requirements.txt
        working-directory: ./Files
        run: |
          echo -e "requests\nbeautifulsoup4\nselenium\npytz\njdatetime" > requirements.txt

      - name: Install dependencies
        working-directory: ./Files
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        working-directory: ./Files
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git checkout main
          git add proxy.txt README.md Files/requirements.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "⛓️‍💥 Argh94 Update "
          git push || echo "No changes to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: |
            index.html
            proxy.txt
          retention-days: 7

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
